<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 大脑图谱 — Brain Knowledge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0b0f18;
  --panel:    #101520;
  --card:     #161d2e;
  --card-bd:  rgba(255,255,255,0.06);
  --text:     #ddd6c8;
  --muted:    #7a8499;
  --gold:     #e8a74c;
  --gold-dim: rgba(232,167,76,0.12);
  --blue:     #7dd3fc;
  --green:    #86efac;
  --purple:   #c4b5fd;
  --red:      #f87171;
  --pink:     #f472b6;
  --teal:     #5eead4;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: radial-gradient(ellipse at center, #131a2a 0%, #0b0f18 70%);
  color: var(--text);
  font-family: 'DM Sans', 'Noto Serif SC', serif;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 58px;
  background: rgba(16,21,32,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--card-bd);
  display: flex; align-items: center;
  padding: 0 22px;
  z-index: 20;
  gap: 20px;
}
.topbar a.back {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  transition: color .18s;
}
.topbar a.back:hover { color: var(--gold); }
.topbar .title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #f0ece3;
  letter-spacing: -0.01em;
}
.topbar .title small {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 1px;
}
.topbar .spacer { flex: 1; }
.topbar .toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  user-select: none;
}
.topbar .toggle input { accent-color: var(--gold); cursor: pointer; }
.topbar .toggle:hover { color: var(--text); }

/* ── LEFT PANEL ── */
.panel-left {
  position: fixed;
  top: 58px; left: 0; bottom: 0;
  width: 240px;
  background: rgba(16,21,32,0.75);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--card-bd);
  padding: 18px 0 18px;
  overflow-y: auto;
  z-index: 10;
}
.panel-left h3, .panel-right h3 {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 500;
  padding: 4px 22px 12px;
}
.region-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 22px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  color: var(--muted);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .18s;
  line-height: 1.35;
}
.region-item:hover {
  color: var(--text);
  background: rgba(255,255,255,0.02);
}
.region-item.active {
  color: var(--gold);
  border-left-color: var(--gold);
  background: var(--gold-dim);
}
.region-item .swatch {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.region-item .en {
  font-size: 10px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.04em;
  display: block;
  margin-top: 1px;
}
.region-item .text { flex: 1; }

/* ── RIGHT PANEL ── */
.panel-right {
  position: fixed;
  top: 58px; right: 0; bottom: 0;
  width: 240px;
  background: rgba(16,21,32,0.75);
  backdrop-filter: blur(10px);
  border-left: 1px solid var(--card-bd);
  padding: 18px 0 18px;
  overflow-y: auto;
  z-index: 10;
  display: flex; flex-direction: column;
}
.neuro-list { flex: 1; }
.neuro-item {
  margin: 0 16px 8px;
  padding: 11px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--card-bd);
  cursor: pointer;
  transition: all .2s;
  font-family: 'Noto Serif SC', serif;
}
.neuro-item:hover {
  background: rgba(255,255,255,0.06);
  transform: translateY(-1px);
}
.neuro-item.active {
  background: var(--gold-dim);
  border-color: var(--gold);
}
.neuro-item .zh {
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.neuro-item.active .zh { color: var(--gold); }
.neuro-item .en {
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.06em;
  font-family: 'DM Sans', sans-serif;
  margin-top: 2px;
}
.neuro-dot {
  width: 8px; height: 8px; border-radius: 50%;
  box-shadow: 0 0 8px currentColor;
}
.clear-btn {
  margin: 8px 16px 4px;
  padding: 10px;
  text-align: center;
  background: transparent;
  border: 1px solid var(--card-bd);
  border-radius: 8px;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  transition: all .18s;
}
.clear-btn:hover {
  color: var(--gold);
  border-color: var(--gold);
}

/* ── CANVAS / SCENE ── */
#canvas-wrap {
  position: fixed;
  top: 58px; left: 240px; right: 240px; bottom: 0;
  overflow: hidden;
}
#three-canvas {
  display: block;
  width: 100%; height: 100%;
}
#label-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
}

/* ── 3D LABELS ── */
.region-label {
  font-family: 'Noto Serif SC', serif;
  font-size: 12.5px;
  color: #f0ece3;
  background: rgba(16,21,32,0.88);
  border: 1px solid rgba(232,167,76,0.4);
  padding: 4px 9px;
  border-radius: 14px;
  white-space: nowrap;
  pointer-events: none;
  letter-spacing: 0.02em;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity .2s;
  transform: translate(-50%, -50%);
  position: absolute;
}
.region-label.visible { opacity: 1; }
.region-label .en {
  display: block;
  font-size: 9.5px;
  color: var(--muted);
  letter-spacing: 0.1em;
  font-family: 'DM Sans', sans-serif;
  text-align: center;
  margin-top: 1px;
}

.nuclei-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10.5px;
  color: var(--gold);
  background: rgba(232,167,76,0.12);
  border: 1px solid var(--gold);
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  letter-spacing: 0.08em;
  pointer-events: none;
  transform: translate(-50%, -50%);
  position: absolute;
}

/* ── VIEW BUTTONS ── */
.view-buttons {
  position: absolute;
  bottom: 22px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 8px;
  background: rgba(16,21,32,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--card-bd);
  padding: 6px;
  border-radius: 12px;
  z-index: 5;
}
.view-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  padding: 7px 16px;
  font-size: 13px;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  transition: all .18s;
}
.view-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.view-btn.active { color: var(--gold); background: var(--gold-dim); }

/* ── DETAIL CARD ── */
.detail-card {
  position: absolute;
  bottom: 22px; left: 22px;
  width: 320px;
  background: rgba(16,21,32,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid var(--card-bd);
  border-radius: 14px;
  padding: 20px 22px 18px;
  opacity: 0;
  transform: translateY(16px);
  transition: all .25s ease-out;
  pointer-events: none;
  z-index: 6;
}
.detail-card.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.detail-card .close {
  position: absolute;
  top: 12px; right: 14px;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 4px;
  transition: color .18s;
}
.detail-card .close:hover { color: var(--gold); }
.detail-card .label-pill {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 3px 9px;
  background: var(--gold-dim);
  border-radius: 10px;
  margin-bottom: 12px;
}
.detail-card .zh-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: #f0ece3;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.detail-card .en-name {
  font-size: 12px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.08em;
  margin-top: 4px;
  margin-bottom: 14px;
}
.detail-card .desc {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
}

/* ── LOADING ── */
.loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 100;
  transition: opacity .5s;
}
.loading.hidden { opacity: 0; pointer-events: none; }
.loading .spin {
  width: 40px; height: 40px;
  border: 2px solid var(--card-bd);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
.loading .tip {
  color: var(--muted);
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .panel-left, .panel-right {
    top: auto; bottom: 0;
    width: 100%; height: 42vh;
    border-right: none; border-left: none;
    border-top: 1px solid var(--card-bd);
  }
  .panel-right { display: none; }
  #canvas-wrap { left: 0; right: 0; bottom: 42vh; }
  .detail-card { left: 12px; right: 12px; width: auto; bottom: calc(42vh + 12px); }
  .view-buttons { bottom: calc(42vh + 12px); }
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js"
  }
}

<div class="topbar">
  <a class="back" href="index.html">← 返回知识库</a>
  <div class="title">

  </div>

  </label>

<aside class="panel-right">

    <span class="close" id="detail-close">×</span>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════════
// 3D value noise (用于大脑皮层沟回位移)
// ═══════════════════════════════════════════════════════════════════
function hash3(x, y, z) {
  const s = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
  return s - Math.floor(s);
}
function vnoise(x, y, z) {
  const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
  const xf = x - xi, yf = y - yi, zf = z - zi;
  const u = xf*xf*(3-2*xf), v = yf*yf*(3-2*yf), w = zf*zf*(3-2*zf);
  const c000 = hash3(xi, yi, zi),     c100 = hash3(xi+1, yi, zi);
  const c010 = hash3(xi, yi+1, zi),   c110 = hash3(xi+1, yi+1, zi);
  const c001 = hash3(xi, yi, zi+1),   c101 = hash3(xi+1, yi, zi+1);
  const c011 = hash3(xi, yi+1, zi+1), c111 = hash3(xi+1, yi+1, zi+1);
  const x00 = c000 + u*(c100-c000), x10 = c010 + u*(c110-c010);
  const x01 = c001 + u*(c101-c001), x11 = c011 + u*(c111-c011);
  const y0 = x00 + v*(x10-x00), y1 = x01 + v*(x11-x01);
  return (y0 + w*(y1-y0)) * 2 - 1;
}
function fbm(x, y, z) {
  return vnoise(x, y, z) * 0.5 + vnoise(x*2.1, y*2.1, z*2.1) * 0.25 + vnoise(x*4.3, y*4.3, z*4.3) * 0.125;
}

// ═══════════════════════════════════════════════════════════════════
// 数据：脑区 REGIONS
// ═══════════════════════════════════════════════════════════════════

const REGIONS = [
  {
    id: 'prefrontal',
    zh: '前额叶',
    en: 'Prefrontal Cortex',
    color: 0xe8a74c,
    desc: '位于额叶最前端，负责决策、计划、工作记忆和抑制控制。被称为"大脑的CEO"，发育最晚（25岁左右成熟），也最易受疲劳和多巴胺波动影响。',
    build: (mkMesh, mirror) => {
      const geom = new THREE.SphereGeometry(0.55, 48, 48, 0, Math.PI*2, 0, Math.PI * 0.55);
      geom.scale(1.1, 0.85, 1.05);
      geom.translate(0, 0.15, 0.78);
      geom.rotateX(-Math.PI * 0.1);
      return [mkMesh(geom, 0xe8a74c, 'prefrontal')];
    },
    labelPos: [0, 0.55, 1.15],
  },
  {
    id: 'dlpfc',
    zh: '背外侧前额叶',
    en: 'DLPFC',
    color: 0xf4c674,
    desc: '前额叶的背外侧部分（左右各一），执行控制和认知灵活性的核心区，负责工作记忆、规划和任务切换。冥想、刻意练习可增强其功能。',
    build: (mkMesh, mirror) => mirror(0.72, 0.55, 0.85).map(([x,y,z]) => {
      const g = new THREE.SphereGeometry(0.22, 32, 32);
      g.scale(1, 0.8, 1.2);
      g.translate(x, y, z);
      return mkMesh(g, 0xf4c674, 'dlpfc');
    }),
    labelPos: [0.95, 0.75, 0.85],
  },
  {
    id: 'vlpfc',
    zh: '腹外侧前额叶',
    en: 'VLPFC',
    color: 0xd89247,
    desc: '前额叶腹外侧，与情绪调节、语言和反应抑制有关。失眠或疲劳时功能显著下降，导致情绪敏感和冲动增加。',
    build: (mkMesh, mirror) => mirror(0.88, 0.0, 0.75).map(([x,y,z]) => {
      const g = new THREE.SphereGeometry(0.2, 32, 32);
      g.scale(0.9, 0.9, 1.1);
      g.translate(x, y, z);
      return mkMesh(g, 0xd89247, 'vlpfc');
    }),
    labelPos: [1.1, 0.0, 0.75],
  },
  {
    id: 'ofc',
    zh: '眶额皮质',
    en: 'Orbitofrontal Cortex',
    color: 0xf5a76b,
    desc: '位于额叶底部，紧贴眼眶之上。整合奖赏价值与决策，参与冲动控制、饮食和社交判断。成瘾者此区常见功能异常。',
    build: (mkMesh, mirror) => {
      const g = new THREE.SphereGeometry(0.35, 32, 32);
      g.scale(1.4, 0.28, 1.2);
      g.translate(0, -0.45, 0.9);
      return [mkMesh(g, 0xf5a76b, 'ofc')];
    },
    labelPos: [0, -0.55, 1.1],
  },
  {
    id: 'hippocampus',
    zh: '海马体',
    en: 'Hippocampus',
    color: 0x7dd3fc,
    desc: '位于颞叶内侧，形似海马（故名）。负责将短期记忆固化为长期记忆、空间导航。在阿尔茨海默症早期萎缩，也受慢性皮质醇损伤。',
    build: (mkMesh, mirror) => mirror(0.55, -0.25, 0.05).map(([x,y,z]) => {
      const sign = x > 0 ? 1 : -1;
      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(x, y + 0.05, z + 0.3),
        new THREE.Vector3(x + sign*0.05, y - 0.05, z),
        new THREE.Vector3(x, y - 0.1, z - 0.3),
        new THREE.Vector3(x - sign*0.1, y, z - 0.5),
      ]);
      const g = new THREE.TubeGeometry(curve, 48, 0.09, 12, false);
      return mkMesh(g, 0x7dd3fc, 'hippocampus');
    }),
    labelPos: [0.9, -0.3, -0.2],
  },
  {
    id: 'amygdala',
    zh: '杏仁核',
    en: 'Amygdala',
    color: 0xf87171,
    desc: '海马体前端的杏仁状核团（左右各一）。恐惧、愤怒、威胁侦测的中枢，焦虑障碍和PTSD的核心区。皮质醇急性升高时杏仁核过度激活。',
    build: (mkMesh, mirror) => mirror(0.6, -0.3, 0.38).map(([x,y,z]) => {
      const g = new THREE.SphereGeometry(0.16, 32, 32);
      g.scale(1.1, 0.9, 1.3);
      g.translate(x, y, z);
      return mkMesh(g, 0xf87171, 'amygdala');
    }),
    labelPos: [0.85, -0.4, 0.5],
  },
  {
    id: 'thalamus',
    zh: '丘脑',
    en: 'Thalamus',
    color: 0xc4b5fd,
    desc: '大脑中央的中继站，除嗅觉外所有感觉信号都要经它转发到皮层。也调节觉醒水平和意识状态。',
    build: (mkMesh, mirror) => mirror(0.17, 0.05, 0).map(([x,y,z]) => {
      const g = new THREE.SphereGeometry(0.18, 32, 32);
      g.scale(1.1, 0.9, 1.4);
      g.translate(x, y, z);
      return mkMesh(g, 0xc4b5fd, 'thalamus');
    }),
    labelPos: [0.3, 0.35, 0],
  },
  {
    id: 'striatum',
    zh: '纹状体',
    en: 'Striatum',
    color: 0x5eead4,
    desc: '基底节的核心部分，包括尾状核和壳核。接收多巴胺投射，参与习惯形成、动作选择、奖赏学习。成瘾行为的神经基础。',
    build: (mkMesh, mirror) => mirror(0.42, 0.22, 0.25).map(([x,y,z]) => {
      const sign = x > 0 ? 1 : -1;
      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(x - sign*0.1, y + 0.15, z + 0.2),
        new THREE.Vector3(x, y + 0.05, z),
        new THREE.Vector3(x + sign*0.05, y - 0.1, z - 0.15),
      ]);
      const g = new THREE.TubeGeometry(curve, 32, 0.13, 14, false);
      return mkMesh(g, 0x5eead4, 'striatum');
    }),
    labelPos: [0.6, 0.4, 0.3],
  },
  {
    id: 'nacc',
    zh: '伏隔核',

// ── 大脑皮层 (带沟回的真实感位移)
function buildCortex(radius, detail) {
  const g = new THREE.SphereGeometry(radius, detail, detail);
  g.scale(1.28, 0.98, 1.48);
  const pos = g.attributes.position;
  const v = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    const n = v.clone().normalize();
    // 多频叠加的沟回 (使用 |noise| 产生脊状效果)
    const f1 = Math.abs(fbm(v.x * 3.2, v.y * 3.2, v.z * 3.2));
    const f2 = Math.abs(vnoise(v.x * 7, v.y * 7, v.z * 7));
    const f3 = vnoise(v.x * 14, v.y * 14, v.z * 14);
    const ridge = -f1 * 0.085 - f2 * 0.035 - f3 * 0.012;
    v.addScaledVector(n, ridge);
    // 中央纵裂 (longitudinal fissure): x≈0 处向中线凹
    const fissure = Math.exp(-Math.pow(v.x / 0.09, 2)) * 0.12;
    // 只在上半部和中央z段有明显纵裂
    const fissureMask = Math.max(0, Math.min(1, (v.y + 0.3) * 1.5));
    v.x *= (1 - fissure * fissureMask * 0.85);
    // 额叶稍微前凸
    if (v.z > 0.6) v.z += (v.z - 0.6) * 0.08;
    // 枕叶(后脑)稍微饱满
    if (v.z < -0.8) v.y += 0.015;
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  g.computeVertexNormals();
  return g;
}

function mkMesh(geom, color, regionId) {
  const mat = new THREE.MeshPhongMaterial({
    color,
    shininess: 40,
    specular: 0x333333,
    emissive: color,
    emissiveIntensity: 0.08,
    transparent: true,

  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.userData.regionId = regionId;
  mesh.userData.baseColor = color;
  mesh.userData.baseEmissive = 0.08;
  return mesh;
}
function mirror(x, y, z) { return [[x,y,z],[-x,y,z]]; }

// ═══════════════════════════════════════════════════════════════════
// 交互：Raycasting
// ═══════════════════════════════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoveredId = null;
let selectedId = null;

function pickRegion(ev) {
  const rect = canvas.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(regionMeshes, false);
  return hits.length > 0 ? hits[0].object.userData.regionId : null;
}

function setHover(id) {
  if (id === hoveredId) return;
  if (hoveredId && hoveredId !== selectedId) applyHighlight(hoveredId, false);
  hoveredId = id;
  if (hoveredId && hoveredId !== selectedId) applyHighlight(hoveredId, true);
  canvas.style.cursor = id ? 'pointer' : 'default';
}

function applyHighlight(regionId, on) {
  const entry = regionMap[regionId];
  if (!entry) return;
  entry.meshes.forEach(m => {
    m.material.emissiveIntensity = on ? 0.6 : m.userData.baseEmissive;
  });
}

function selectRegion(id) {
  if (selectedId === id) return;
  if (selectedId) applyHighlight(selectedId, false);
  selectedId = id;
  if (selectedId) {
    applyHighlight(selectedId, true);
    const r = regionMap[id].region;
    showDetailCard(r);
    document.querySelectorAll('.region-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
  }
}

canvas.addEventListener('pointermove', (e) => {
  const id = pickRegion(e);
  setHover(id);
});

canvas.addEventListener('pointerdown', (e) => {
  // track to distinguish click from drag
  canvas._dragStart = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('pointerup', (e) => {
  if (!canvas._dragStart) return;
  const dx = e.clientX - canvas._dragStart.x;
  const dy = e.clientY - canvas._dragStart.y;
  if (dx*dx + dy*dy < 25) {
    const id = pickRegion(e);
    if (id) selectRegion(id);
  }
  canvas._dragStart = null;
});

const views = {

  side:     { pos: [4.5, 0.3, 0], target: [0, 0, 0], clip: false },

  sagittal: { pos: [4.0, 0.3, 0.6], target: [0, 0, 0], clip: true },
};

function tween(from, to, duration, onUpdate, onDone) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
    onUpdate(from.map((v,i) => v + (to[i]-v)*e));
    if (t < 1) requestAnimationFrame(step);
    else if (onDone) onDone();
  }
  requestAnimationFrame(step);
}

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const v = views[btn.dataset.view];
    const from = [camera.position.x, camera.position.y, camera.position.z];
    tween(from, v.pos, 800, (p) => {
      camera.position.set(p[0], p[1], p[2]);
      camera.lookAt(0,0,0);
    });
    // clipping toggle
    renderer.clippingPlanes = v.clip ? [sagittalPlane] : [];
    controls.autoRotate = false;
  });
});

  el.innerHTML = `
    <div class="zh"><span class="neuro-dot" style="background:${colorHex};color:${colorHex}"></span>${n.zh}</div>
    <div class="en">${n.en.toUpperCase()}</div>
  `;
  el.addEventListener('click', () => toggleNeuro(n.id));
  neuroList.appendChild(el);
});

function clearNeuro() {
  neuroArtifacts.forEach(obj => {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
  });
  neuroArtifacts.length = 0;
  travelers.length = 0;
  nucleiLabels.forEach(({ el }) => el.remove());
  nucleiLabels = [];
  // restore shell
  tween([shellMat.opacity], [0.42], 400, (p) => shellMat.opacity = p[0]);
  tween([rimMat.opacity], [0.35], 400, (p) => rimMat.opacity = p[0]);
  activeNeuro = null;
  document.querySelectorAll('.neuro-item').forEach(el => el.classList.remove('active'));
  // restore region emissive
  regionMeshes.forEach(m => {
    m.material.emissiveIntensity = m.userData.baseEmissive;
  });
}

function toggleNeuro(id) {
  if (activeNeuro === id) { clearNeuro(); return; }
  clearNeuro();
  const n = NEUROTRANS.find(x => x.id === id);
  if (!n) return;
  activeNeuro = id;
  document.querySelectorAll('.neuro-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // 淡化外壳
  tween([shellMat.opacity], [0.08], 400, (p) => shellMat.opacity = p[0]);
  tween([rimMat.opacity], [0.12], 400, (p) => rimMat.opacity = p[0]);

  // 全局模式 (GABA / glutamate)：所有目标区域染色脉动
  if (n.mode === 'global-dim' || n.mode === 'global-bright') {
    n.targets.forEach(tid => {
      const entry = regionMap[tid];
      if (!entry) return;
      entry.meshes.forEach(m => {
        const orig = new THREE.Color(m.userData.baseColor);
        const target = new THREE.Color(n.color);
        m.material.emissive = target;
        m.material.emissiveIntensity = n.mode === 'global-bright' ? 0.9 : 0.4;
      });
    });
    return;
  }

  // 起源核团 (脉动发光球) + 标签
  const sourcePositions = [];
  n.sources.forEach(src => {
    const g = new THREE.SphereGeometry(0.055, 20, 20);
    g.translate(src.pos[0], src.pos[1], src.pos[2]);
    const mat = new THREE.MeshBasicMaterial({
      color: n.color,
      transparent: true,
      opacity: 0.95,
    });
    const mesh = new THREE.Mesh(g, mat);
    mesh.userData.pulseBase = [src.pos[0], src.pos[1], src.pos[2]];
    mesh.userData.isSource = true;
    scene.add(mesh);
    neuroArtifacts.push(mesh);
    sourcePositions.push(src.pos);
    // halo
    const hg = new THREE.SphereGeometry(0.12, 20, 20);
    hg.translate(src.pos[0], src.pos[1], src.pos[2]);
    const hm = new THREE.MeshBasicMaterial({
      color: n.color,
      transparent: true,
      opacity: 0.2,
      depthWrite: false,
    });
    const halo = new THREE.Mesh(hg, hm);
    halo.userData.isHalo = true;
    halo.userData.pulseBase = [src.pos[0], src.pos[1], src.pos[2]];
    scene.add(halo);
    neuroArtifacts.push(halo);
    // label
    const lbl = document.createElement('div');
    lbl.className = 'nuclei-label';
    lbl.textContent = src.label;
    lbl.style.color = '#' + n.color.toString(16).padStart(6, '0');
    lbl.style.borderColor = '#' + n.color.toString(16).padStart(6, '0');
    labelLayer.appendChild(lbl);
    nucleiLabels.push({ el: lbl, pos3: new THREE.Vector3(src.pos[0], src.pos[1]+0.14, src.pos[2]) });
  });

  // 投射路径：每个 source 向每个 target 发射粒子流
  n.targets.forEach(tid => {
    const entry = regionMap[tid];
    if (!entry) return;
    const targetPos = entry.region.labelPos;
    // find nearest source for this target
    sourcePositions.forEach(srcPos => {
      const start = new THREE.Vector3(...srcPos);
      const end = new THREE.Vector3(targetPos[0] * 0.7, targetPos[1] * 0.7, targetPos[2] * 0.7);
      const mid = new THREE.Vector3().lerpVectors(start, end, 0.5);
      mid.y += 0.15 + Math.random() * 0.1;
      mid.x += (Math.random() - 0.5) * 0.1;
      const curve = new THREE.CatmullRomCurve3([start, mid, end]);

      // 背景曲线 (淡)
      const tubeGeom = new THREE.TubeGeometry(curve, 32, 0.008, 6, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: n.color,
        transparent: true,
        opacity: 0.25,
        depthWrite: false,
      });
      const tube = new THREE.Mesh(tubeGeom, tubeMat);
      scene.add(tube);
      neuroArtifacts.push(tube);

      // 流动粒子
      const particleCount = 6;
      const particles = [];
      for (let i = 0; i < particleCount; i++) {
        const pg = new THREE.SphereGeometry(0.035, 12, 12);
        const pm = new THREE.MeshBasicMaterial({
          color: n.color,
          transparent: true,
          opacity: 0.9,
        });
        const p = new THREE.Mesh(pg, pm);
        scene.add(p);
        neuroArtifacts.push(p);
        particles.push(p);
      }
      travelers.push({ curve, particles, offset: Math.random(), speed: 0.4 });
    });

    // 目标区域轻微emissive
    entry.meshes.forEach(m => {
      m.material.emissive = new THREE.Color(n.color);
      m.material.emissiveIntensity = 0.25;
    });
  });
}

document.getElementById('clearBtn').addEventListener('click', clearNeuro);

// ═══════════════════════════════════════════════════════════════════
// 渲染循环
// ═══════════════════════════════════════════════════════════════════

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // 起源球脉动
  neuroArtifacts.forEach(obj => {
    if (obj.userData && obj.userData.isSource) {
      const s = 1 + Math.sin(t * 3) * 0.3;
      obj.scale.setScalar(s);
    } else if (obj.userData && obj.userData.isHalo) {
      const s = 1.2 + Math.sin(t * 2.5) * 0.35;
      obj.scale.setScalar(s);
      if (obj.material) obj.material.opacity = 0.15 + Math.sin(t * 2.5) * 0.1;
    }
  });

  // 粒子沿曲线流动
  travelers.forEach(tr => {
    tr.offset = (tr.offset + dt * tr.speed) % 1;
    tr.particles.forEach((p, i) => {
      const u = (tr.offset + i / tr.particles.length) % 1;
      const pos = tr.curve.getPoint(u);
      p.position.copy(pos);
      // fade at start/end
      p.material.opacity = 0.3 + Math.sin(u * Math.PI) * 0.6;
    });
  });

  controls.update();
  renderer.render(scene, camera);
  updateLabels();
}

// ═══════════════════════════════════════════════════════════════════
// 窗口自适应
// ═══════════════════════════════════════════════════════════════════

function resize() {
  const rect = canvasWrap.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// 启动
animate();
requestAnimationFrame(() => {
  document.getElementById('loading').classList.add('hidden');
});

// 全局错误兜底
window.addEventListener('error', (ev) => {
  const loading = document.getElementById('loading');
  loading.innerHTML = `<div style="color:#f87171;font-family:'Noto Serif SC',serif;font-size:14px;max-width:420px;text-align:center;padding:0 20px;line-height:1.7">
    <div style="font-size:28px;margin-bottom:12px">⚠️</div>
    <div style="color:#ddd6c8;margin-bottom:8px">构建失败</div>
    <div style="color:#7a8499;font-size:12px;word-break:break-all">${ev.message}</div>
    <div style="color:#7a8499;font-size:11px;margin-top:14px">首次加载需要联网(拉取Three.js CDN)，请检查网络后刷新</div>
  </div>`;
});
</script>
